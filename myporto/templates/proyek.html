    <section id="proyek" class="py-24 relative z-10">
        <div class="max-w-6xl mx-auto px-4">
            <div class="text-center mb-16" data-aos="fade-up">
                <h2 class="text-4xl font-bold text-textMain mb-2">Proyek <span class="text-accent">Unggulan</span></h2>
                <div class="w-16 h-1 bg-accent mx-auto rounded-full"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                {% for project in projects %}
                <div class="glass-card rounded-2xl p-6" data-aos="fade-up" data-aos-delay="100">
                    <div class="h-40 bg-pink-100/70 rounded-xl mb-6 flex items-center justify-center text-4xl">{{ project.icon }}</div>
                    <h3 class="text-xl font-bold text-textMain mb-3">{{ project.title }}</h3>
                    <p class="text-textMuted text-sm mb-4">{{ project.description }}</p>
                    {% if project.repo_link %}
                    <a href="{{ project.repo_link }}" target="_blank" class="inline-flex items-center gap-2 text-accent font-semibold hover:text-pink-600 transition-colors">
                        <i class="devicon-github-original"></i> Lihat Source Code
                    </a>
                    {% endif %}
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
