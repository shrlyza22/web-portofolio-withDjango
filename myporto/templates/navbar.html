{% load static %}
<nav x-data="{ open: false }" class="fixed w-full z-50 glass-card border-b border-white/50 bg-white/40 backdrop-blur-md">
    <div class="w-full px-4 lg:px-5 py-5 flex justify-between items-center">
        
        <a href="#home" class="text-2xl font-bold tracking-wider text-textMain flex items-center gap-2 hover:opacity-80 transition duration-300">
            <img 
                src="{% static 'img/jellyfish.svg' %}" 
                alt="Jellyfish Logo" 
                class="h-10 w-auto jelly-float"
            >
            <span>MY <span class="navbar-logo-accent">PORTOFOLIO</span></span>
        </a>
        
        <ul class="hidden md:flex space-x-6 text-sm font-semibold">
            <li><a href="#home" class="hover:text-accent transition duration-300">Beranda</a></li>
            <li><a href="#tentang" class="hover:text-accent transition duration-300">Tentang Saya</a></li>
            <li><a href="#pendidikan" class="hover:text-accent transition duration-300">Pendidikan</a></li>
            <li><a href="#keahlian" class="hover:text-accent transition duration-300">Keahlian</a></li>
            <li><a href="#proyek" class="hover:text-accent transition duration-300">Proyek</a></li>
            <li><a href="#kontak" class="hover:text-accent transition duration-300">Kontak</a></li>
        </ul>

        <div class="md:hidden flex items-center">
            <button @click="open = !open" class="text-textMain focus:outline-none hover:text-accent transition">

                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :class="{'hidden': open, 'inline-flex': !open }" d="M4 6h16M4 12h16m-7 6h7"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :class="{'hidden': !open, 'inline-flex': open }" d="M6 18L18 6M6 6l12 12"></path>

        </div>
    </div>

    <!-- Mobile Menu -->
    <div x-show="open" @click.away="open = false" x-transition class="md:hidden glass-card border-t border-white/50 shadow-lg">
        <ul class="flex flex-col space-y-4 px-4 py-6 text-sm font-semibold text-center">
            <li><a @click="open = false" href="#home" class="block hover:text-accent transition duration-300">Beranda</a></li>
            <li><a @click="open = false" href="#tentang" class="block hover:text-accent transition duration-300">Tentang Saya</a></li>

            <li><a @click="open = false" href="#keahlian" class="block hover:text-accent transition duration-300">Keahlian</a></li>

            <li><a @click="open = false" href="#kontak" class="block hover:text-accent transition duration-300">Kontak</a></li>
