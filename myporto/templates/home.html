{% load static %}
<section id="home" 
        x-data="{ shown: false }" 
        x-intersect.once="shown = true" 
        class="min-h-screen flex items-center justify-center pt-32 relative z-10">
    <div class="max-w-6xl mx-auto px-4 w-full">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center">
            
            <div class="text-center md:text-left transition-all duration-1000 transform" 
                :class="shown ? 'opacity-100 scale-100' : 'opacity-0 scale-90'">
                
                <h2 class="text-textMuted text-xl font-medium mb-2">Halo, perkenalkan saya</h2>
                <h1 class="text-5xl md:text-6xl font-bold text-textMain mb-4">Sheren <span class="text-accent">Aulia</span></h1>
                
                <p class="text-xl md:text-2xl text-textMuted mb-10">
                    Seorang <span class="text-accent font-semibold">Web Developer • Tech Enthusiast • Problem Solver</span>
                </p>
                <a href="#tentang" class="inline-block bg-accent hover:bg-pink-500 text-white font-bold py-3 px-10 rounded-full shadow-lg shadow-pink-300/50 transition duration-300 transform hover:scale-105">
                    Mulai Kenalan
                </a>
            </div>

            <div class="flex justify-center md:justify-end transition-all duration-1000 delay-300 transform"
                :class="shown ? 'opacity-100 scale-100' : 'opacity-0 scale-90'">
                <div class="w-full max-w-sm md:max-w-md aspect-square flex items-center justify-center">
                    <img src="{% static 'img/foto 4.jpg' %}" alt="Sheren Aulia" class="shape-blob w-full h-full object-cover border-4 border-white/80">
                </div>
            </div>

        </div>
    </div>
</section>
